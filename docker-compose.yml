services:
  postgres:
    image: postgres:16
    container_name: chuoi_xanh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: chuoi_xanh_viet
    ports:
      - '5432:5432'
    volumes:
      - pgdata_chuoi_xanh:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d chuoi_xanh_viet']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_chuoi_xanh:
