# `docker compose` đọc `.env` cùng thư mục để nội suy ${VAR}. FE :3000 — set FRONTEND_URLS + PUBLIC_APP_URL trong .env.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chuoi-xanh-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_TOKEN_SECRET: ${JWT_ACCESS_TOKEN_SECRET}
      JWT_ACCESS_TOKEN_EXPIRES_IN: ${JWT_ACCESS_TOKEN_EXPIRES_IN}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET}
      JWT_REFRESH_TOKEN_EXPIRES_IN: ${JWT_REFRESH_TOKEN_EXPIRES_IN}
      JWT_RESET_PASSWORD_TOKEN_SECRET: ${JWT_RESET_PASSWORD_TOKEN_SECRET}
      JWT_RESET_PASSWORD_TOKEN_EXPIRES_IN: ${JWT_RESET_PASSWORD_TOKEN_EXPIRES_IN}
      PASSWORD_HASH_SECRET: ${PASSWORD_HASH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      CLIENT_RESET_PASSWORD_URL: ${CLIENT_RESET_PASSWORD_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      FRONTEND_URL: ${FRONTEND_URL:-}
      FRONTEND_URLS: ${FRONTEND_URLS:-http://localhost:3000,http://178.128.98.214:3000}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://178.128.98.214:3000}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL}
      ANCHOR_WALLET_PRIVATE_KEY: ${ANCHOR_WALLET_PRIVATE_KEY}
      ANCHOR_CONTRACT_ADDRESS: ${ANCHOR_CONTRACT_ADDRESS}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS}
      GEMINI_MODEL: ${GEMINI_MODEL}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES}
      GEMINI_TEMPERATURE: ${GEMINI_TEMPERATURE}
      IMAGE_WORKER_SERVICE_API: ${IMAGE_WORKER_SERVICE_API}
      IMAGE_WORKER_SERVICE_KEY: ${IMAGE_WORKER_SERVICE_KEY}
      DOCUMENT_WORKER_SERVICE_API: ${DOCUMENT_WORKER_SERVICE_API:-}
      DOCUMENT_WORKER_SERVICE_KEY: ${DOCUMENT_WORKER_SERVICE_KEY:-}
      ZALO_OA_ENABLED: ${ZALO_OA_ENABLED:-0}
      ZALO_OA_APP_ID: ${ZALO_OA_APP_ID:-}
      ZALO_OA_APP_SECRET: ${ZALO_OA_APP_SECRET:-}
      ZALO_OA_REFRESH_TOKEN: ${ZALO_OA_REFRESH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - '8001:8000'
    networks:
      chuoi-xanh-net:
        aliases:
          - api

networks:
  chuoi-xanh-net:
    name: chuoi-xanh-net
