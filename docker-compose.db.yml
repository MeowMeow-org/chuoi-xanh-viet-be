services:
  db:
    image: postgres:16-alpine
    container_name: chuoi-xanh-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin12345
      POSTGRES_DB: chuoi_xanh_viet
    volumes:
      - chuoi-xanh-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d chuoi_xanh_viet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chuoi-xanh-net

volumes:
  chuoi-xanh-db-data:

networks:
  chuoi-xanh-net:
    name: chuoi-xanh-net
